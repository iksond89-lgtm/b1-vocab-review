<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字隨身記</title>
    <script src="vocab_data.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        button { background-color: #4a90e2; color: white; border: none; padding: 15px 30px; margin: 10px; font-size: 18px; border-radius: 25px; cursor: pointer; }
        #quiz-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 300px; margin: 20px auto; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>📖 單字隨身記</h1>
        <button onclick="goToUnit('b1')">第一冊：開始測驗</button>
    </div>

    <div id="page-units" class="page">
        <h1>選擇 Unit</h1>
        <div id="unit-buttons"></div>
    </div>

    <div id="page-quiz" class="page">
        <div id="quiz-card">
            <h2 id="question">單字</h2>
            <h3 id="answer" style="color: #d32f2f;">(點擊看答案)</h3>
        </div>
        <button onclick="reveal()">看答案</button>
        <button onclick="nextWord()">下一題</button>
    </div>

    <script>
        let filteredVocab = [];
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function goToUnit(book) {
            const container = document.getElementById('unit-buttons');
            container.innerHTML = '';
            for(let i=1; i<=10; i++) {
                let btn = document.createElement('button');
                btn.innerText = 'Unit ' + i;
                btn.onclick = () => {
                    filteredVocab = vocabData.filter(w => w.book === book && w.unit === i);
                    if(filteredVocab.length === 0) alert('此單元暫無資料');
                    else { showPage('page-quiz'); nextWord(); }
                };
                container.appendChild(btn);
            }
            showPage('page-units');
        }
        function nextWord() {
            let w = filteredVocab[Math.floor(Math.random() * filteredVocab.length)];
            document.getElementById('question').innerText = w.eng;
            document.getElementById('answer').innerText = "點擊看答案";
        }
        function reveal() {
            let eng = document.getElementById('question').innerText;
            let w = vocabData.find(x => x.eng === eng);
            document.getElementById('answer').innerText = w.ch;
        }
    </script>
</body>
</html>

<div id="quiz-container">
    <h2 id="eng-word">請點擊按鈕</h2>
    <h3 id="ch-meaning" style="display:none;">中文意思會在這裡</h3>
    <button id="btn-show" onclick="reveal()">顯示中文</button>
    <button id="btn-next" onclick="nextWord()">下一題</button>
</div>

<script type="module">
    import { b1Vocab } from './data.js';

    let currentWord = {};

    // 隨機取出一個單字
    window.nextWord = function() {
        const randomIndex = Math.floor(Math.random() * b1Vocab.length);
        currentWord = b1Vocab[randomIndex];
        
        document.getElementById('eng-word').innerText = currentWord.eng;
        document.getElementById('ch-meaning').innerText = currentWord.ch;
        document.getElementById('ch-meaning').style.display = 'none'; // 隱藏中文
    };

    // 顯示中文
    window.reveal = function() {
        document.getElementById('ch-meaning').style.display = 'block';
    };

    // 初始化第一題
    nextWord();
</script>
